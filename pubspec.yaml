name: m2
description: "Professional E-Commerce Flutter Application - M2 Shop"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI and Design
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5+1

  # HTTP Requests & Networking
  http: ^1.2.2

  # Local Storage
  shared_preferences: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
